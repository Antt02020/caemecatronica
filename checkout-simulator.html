<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagopar - Simulador de Pago Seguro</title>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C4DFF;
            --accent: #00E676;
            --bg-base: #0a0b10;
            --bg-surface: #12131a;
            --text-primary: #ffffff;
            --text-muted: #a0a5b5;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .checkout-container {
            width: 100%;
            max-width: 520px;
            background: var(--bg-surface);
            border: 1px solid rgba(124, 77, 255, 0.2);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(124,77,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .pagopar-logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: #00e676;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .pagopar-logo span {
            color: #fff;
        }

        .badge-sim {
            background: rgba(124,77,255,0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .order-summary {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .summary-row:last-child {
            margin-bottom: 0;
            border-top: 1px solid var(--border);
            padding-top: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .summary-label {
            color: var(--text-muted);
        }

        .summary-value {
            color: #fff;
        }

        .summary-value.total {
            color: var(--accent);
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .method-card {
            background: rgba(255,255,255,0.02);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .method-card:hover {
            border-color: var(--primary);
            background: rgba(124, 77, 255, 0.05);
        }

        .method-card.active {
            border-color: var(--accent);
            background: rgba(0, 230, 118, 0.05);
        }

        .method-icon {
            font-size: 1.5rem;
        }

        .method-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .btn-pay {
            width: 100%;
            background: var(--accent);
            color: #050816;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: none;
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3);
        }

        .btn-pay:active {
            transform: translateY(0);
        }

        .btn-cancel {
            width: 100%;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.8rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 82, 82, 0.05);
            border-color: #FF5252;
            color: #FF5252;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 11, 16, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(124, 77, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="header">
            <div class="pagopar-logo">
                <span>pago</span>par
            </div>
            <span class="badge-sim">Entorno de Simulación</span>
        </div>

        <div class="order-summary">
            <div class="summary-row">
                <span class="summary-label">Pedido N°</span>
                <span class="summary-value" id="order-id">CAE-XXXXXX</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Entrenamiento</span>
                <span class="summary-value" id="order-desc">Cargando...</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Comprador</span>
                <span class="summary-value" id="order-buyer">Cargando...</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Monto Total</span>
                <span class="summary-value total" id="order-amount">Gs. 0</span>
            </div>
        </div>

        <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted);">Selecciona tu medio de pago:</h3>
        <div class="payment-methods">
            <div class="method-card active" data-method="Tarjetas de crédito/débito">
                <span class="method-icon">💳</span>
                <span class="method-title">Tarjeta Crédito/Débito</span>
            </div>
            <div class="method-card" data-method="Transferencia Bancaria">
                <span class="method-icon">🏦</span>
                <span class="method-title">Transferencia</span>
            </div>
            <div class="method-card" data-method="Pago Express">
                <span class="method-icon">💸</span>
                <span class="method-title">Pago Express</span>
            </div>
            <div class="method-card" data-method="Billetera Personal / Tigo Money">
                <span class="method-icon">📱</span>
                <span class="method-title">Billetera Móvil</span>
            </div>
        </div>

        <button class="btn-pay" id="btn-submit-payment">PAGAR AHORA</button>
        <button class="btn-cancel" id="btn-cancel-payment">Cancelar y regresar</button>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <h3 style="color:#fff;" id="loading-message">Procesando pago seguro...</h3>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('pedido');
            
            if (!orderId) {
                alert("ID de pedido no encontrado en la URL.");
                window.location.href = 'index.html';
                return;
            }

            let currentOrder = null;
            
            // Read orders from localStorage fallback or server to support both client/server flows
            const fetchOrderInfo = () => {
                // Try from local express server first
                fetch('/api/admin/stats')
                    .then(res => res.json())
                    .then(data => {
                        const order = data.orders.find(o => o.id_pedido_comercio === orderId);
                        if (order) {
                            currentOrder = order;
                            displayOrder(order);
                        } else {
                            fetchLocalFallback();
                        }
                    })
                    .catch(() => {
                        fetchLocalFallback();
                    });
            };

            const fetchLocalFallback = () => {
                // If backend is offline, read from LocalStorage orders list
                const orders = JSON.parse(localStorage.getItem('cae_orders')) || [];
                const order = orders.find(o => o.id_pedido_comercio === orderId);
                if (order) {
                    currentOrder = order;
                    displayOrder(order);
                } else {
                    // Fallback to active logged user basic stats
                    const user = JSON.parse(localStorage.getItem('cae_user'));
                    const pendingSelection = JSON.parse(localStorage.getItem('cae_pending_purchase'));
                    
                    if (user && pendingSelection) {
                        let amount = 990000;
                        let desc = `Entrenamiento Profesional de ${pendingSelection.career}`;
                        if (pendingSelection.plan === 'Premium') {
                            amount = 1490000;
                            desc = "Acceso Premium Completo";
                        } else if (pendingSelection.plan === 'Básico') {
                            amount = 350000 * pendingSelection.modules.length;
                            desc = `Módulos: ${pendingSelection.modules.join(', ')}`;
                        }
                        currentOrder = {
                            id_pedido_comercio: orderId,
                            email: user.email,
                            plan: pendingSelection.plan,
                            career: pendingSelection.career,
                            modules: pendingSelection.modules,
                            monto_total: amount,
                            comprador: {
                                ruc: "",
                                telefono: "",
                                documento: ""
                            }
                        };
                        displayOrder(currentOrder);
                    } else {
                        alert("No se pudo cargar la información de la transacción.");
                        window.location.href = 'entrenamientos.html';
                    }
                }
            };

            const displayOrder = (order) => {
                document.getElementById('order-id').textContent = order.id_pedido_comercio;
                document.getElementById('order-amount').textContent = `Gs. ${order.monto_total.toLocaleString('es-PY')}`;
                
                let desc = "";
                if (order.plan === "Premium") {
                    desc = "Acceso Premium CAE";
                } else if (order.plan === "Profesional") {
                    desc = `Carrera Completa de ${order.career}`;
                } else {
                    desc = `Módulos de ${order.career} (${order.modules.length} modules)`;
                }
                document.getElementById('order-desc').textContent = desc;
                document.getElementById('order-buyer').textContent = order.email;
            };

            fetchOrderInfo();

            // Handle payment method toggle selection
            const methodCards = document.querySelectorAll('.method-card');
            let selectedMethod = "Tarjetas de crédito/débito";
            
            methodCards.forEach(card => {
                card.addEventListener('click', () => {
                    methodCards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedMethod = card.getAttribute('data-method');
                });
            });

            // Submit simulated payment
            document.getElementById('btn-submit-payment').addEventListener('click', () => {
                if (!currentOrder) return;
                
                const overlay = document.getElementById('loading-overlay');
                overlay.style.display = 'flex';
                
                // Simulate payment gateway delays
                setTimeout(() => {
                    const hash_pedido = 'hash_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    
                    const payload = {
                        respuesta: true,
                        resultado: [
                            {
                                pagado: true,
                                numero_comprobante_interno: Math.floor(Math.random() * 9000000 + 1000000).toString(),
                                ultimo_mensaje_error: null,
                                forma_pago: selectedMethod,
                                fecha_pago: new Date().toISOString().replace('T', ' ').slice(0, 19),
                                monto: `${currentOrder.monto_total}.00`,
                                fecha_maxima_pago: new Date(Date.now() + 86400000 * 5).toISOString().replace('T', ' ').slice(0, 19),
                                hash_pedido: hash_pedido,
                                numero_pedido: currentOrder.id_pedido_comercio,
                                cancelado: false,
                                forma_pago_identificador: "1",
                                token: currentOrder.email // we pass comprador email in simulation token
                            }
                        ]
                    };

                    // Send POST callback to express server
                    fetch('/api/pagopar-webhook', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log("Simulated IPN success:", data);
                        // Handle user update in client LocalStorage as well for client-side fallback
                        localUpdateUserPermissions();
                        
                        document.getElementById('loading-message').textContent = "¡Pago procesado con éxito! Redirigiendo...";
                        setTimeout(() => {
                            window.location.href = 'dashboard.html?status=success';
                        }, 1500);
                    })
                    .catch(err => {
                        console.warn("Express webhook failed, falling back to fully local simulation update:", err);
                        localUpdateUserPermissions();
                        
                        document.getElementById('loading-message').textContent = "¡Pago completado! Redirigiendo...";
                        setTimeout(() => {
                            window.location.href = 'dashboard.html?status=success';
                        }, 1500);
                    });
                }, 2000);
            });

            // Local fallback logic
            const localUpdateUserPermissions = () => {
                if (!currentOrder) return;
                
                // Get local users
                const students = JSON.parse(localStorage.getItem('cae_students')) || [];
                const loggedUser = JSON.parse(localStorage.getItem('cae_user'));
                
                if (loggedUser && loggedUser.email.toLowerCase() === currentOrder.email.toLowerCase()) {
                    loggedUser.plan = currentOrder.plan;
                    
                    if (currentOrder.plan === "Premium") {
                        loggedUser.purchasedCareers = ["electronica", "mecatronica"];
                        loggedUser.career = "Ambas";
                    } else if (currentOrder.plan === "Profesional") {
                        if (!loggedUser.purchasedCareers) loggedUser.purchasedCareers = [];
                        if (!loggedUser.purchasedCareers.includes(currentOrder.career.toLowerCase())) {
                            loggedUser.purchasedCareers.push(currentOrder.career.toLowerCase());
                        }
                        loggedUser.career = currentOrder.career;
                    } else { // Básico
                        if (!loggedUser.purchasedModules) loggedUser.purchasedModules = [];
                        currentOrder.modules.forEach(mId => {
                            if (!loggedUser.purchasedModules.includes(mId)) {
                                loggedUser.purchasedModules.push(mId);
                            }
                        });
                        loggedUser.career = currentOrder.career;
                    }
                    
                    // Update session
                    localStorage.setItem('cae_user', JSON.stringify(loggedUser));
                    
                    // Update database student match
                    const sIdx = students.findIndex(s => s.email.toLowerCase() === loggedUser.email.toLowerCase());
                    if (sIdx !== -1) {
                        students[sIdx].plan = loggedUser.plan;
                        students[sIdx].career = loggedUser.career;
                        students[sIdx].purchasedCareers = loggedUser.purchasedCareers;
                        students[sIdx].purchasedModules = loggedUser.purchasedModules;
                        localStorage.setItem('cae_students', JSON.stringify(students));
                    }
                }
                
                // Add order to local list
                const localOrders = JSON.parse(localStorage.getItem('cae_orders')) || [];
                currentOrder.estado = "Completado";
                currentOrder.fecha = new Date().toISOString().split('T')[0];
                localOrders.push(currentOrder);
                localStorage.setItem('cae_orders', JSON.stringify(localOrders));
                
                // Remove pending cache
                localStorage.removeItem('cae_pending_purchase');
            };

            document.getElementById('btn-cancel-payment').addEventListener('click', () => {
                window.location.href = 'entrenamientos.html';
            });
        });
    </script>
</body>
</html>
