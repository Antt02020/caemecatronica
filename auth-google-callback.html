<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando sesión con Google... - CAE</title>
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="/style.v6.css?v=20260628">
    
    <style>
        body {
            background-color: var(--bg-base);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: var(--font-sans);
            color: var(--text-primary);
        }

        .callback-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 77, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 0 50px rgba(124, 77, 255, 0.25), 0 30px 60px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Pulse animation loader */
        .pulse-loader {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--grad-primary);
            opacity: 0.15;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .pulse-circle:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-core {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--grad-primary);
            box-shadow: 0 0 20px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .pulse-core svg {
            color: #fff;
            animation: rotate-spinner 2s linear infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        @keyframes rotate-spinner {
            to { transform: rotate(360deg); }
        }

        .callback-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .callback-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .btn-home {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            background: var(--grad-primary);
            color: #fff;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
            display: none;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 77, 255, 0.6);
        }
    </style>

    <!-- Firebase SDK Compat -->
    <script src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script src="/__/firebase/10.8.0/firebase-auth-compat.js"></script>
    <script src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
</head>
<body>

    <!-- Canvas Particles -->
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <div class="callback-card">
        <div class="pulse-loader" id="loader-icon">
            <div class="pulse-circle"></div>
            <div class="pulse-circle"></div>
            <div class="pulse-core">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="6.34" y1="17.66" x2="9.17" y2="14.83"></line><line x1="14.83" y1="9.17" x2="17.66" y2="6.34"></line></svg>
            </div>
        </div>
        
        <h2 class="callback-title" id="callback-title">Autenticando...</h2>
        <p class="callback-text" id="callback-text">Estamos verificando tus credenciales con Google y sincronizando tu sesión de forma segura. Por favor, no cierres esta ventana.</p>
        
        <a href="/index.html" class="btn-home" id="btn-home">Volver al Inicio</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.location.href = '/';
        });
    </script>

    <!-- Canvas Particles -->
    <script>
        const canvas = document.getElementById('particles-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            class P {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedY = Math.random() * -0.2 - 0.05;
                    this.alpha = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.y += this.speedY;
                    if (this.y < 0) {
                        this.y = canvas.height;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = 'rgba(124, 77, 255, 0.25)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            for(let i=0; i<30; i++) particles.push(new P());
            
            const anim = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(anim);
            };
            anim();
        }
    </script>
</body>
</html>
