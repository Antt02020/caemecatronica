<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando Pago - CAE</title>
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="style.v6.css?v=20260628">
    
    <style>
        body {
            background-color: var(--bg-base);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: var(--font-sans);
            color: var(--text-primary);
        }

        .processing-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 77, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 0 50px rgba(124, 77, 255, 0.25), 0 30px 60px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Pulse animation loader */
        .pulse-loader {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--grad-primary);
            opacity: 0.15;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .pulse-circle:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-core {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--grad-primary);
            box-shadow: 0 0 20px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .pulse-core svg {
            color: #fff;
            animation: rotate-spinner 2s linear infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        @keyframes rotate-spinner {
            to { transform: rotate(360deg); }
        }

        .processing-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .processing-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .status-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .status-badge.verifying {
            color: var(--accent);
            border-color: rgba(167, 139, 250, 0.3);
            background: rgba(167, 139, 250, 0.05);
            animation: pulse-text 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulse-text {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
    </style>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
</head>
<body>

    <!-- Canvas Particles -->
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <div class="processing-card">
        <div class="pulse-loader">
            <div class="pulse-circle"></div>
            <div class="pulse-circle"></div>
            <div class="pulse-core">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="6.34" y1="17.66" x2="9.17" y2="14.83"></line><line x1="14.83" y1="9.17" x2="17.66" y2="6.34"></line></svg>
            </div>
        </div>
        
        <h2 class="processing-title">Verificando tu pago</h2>
        <p class="processing-text" id="status-message">Estamos validando la confirmación de tu pago con Pagopar. Esto puede tomar unos segundos, por favor no cierres esta ventana.</p>
        
        <div class="status-badge verifying" id="status-badge">Verificando...</div>
    </div>

    <!-- Polling Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const hash = urlParams.get('hash_pedido');
            const statusMessage = document.getElementById('status-message');
            const statusBadge = document.getElementById('status-badge');
            
            if (!hash) {
                alert("Código de transacción inválido o faltante.");
                window.location.href = '/';
                return;
            }

            const db = firebase.firestore();
            
            const processSimulation = async () => {
                try {
                    const orderDoc = await db.collection('orders').doc(hash).get();
                    if (!orderDoc.exists) {
                        statusBadge.textContent = "Error";
                        statusMessage.innerHTML = 'No se encontró la orden especificada en el sistema.';
                        return;
                    }
                    
                    const order = orderDoc.data();
                    
                    statusBadge.textContent = "Procesando...";
                    await new Promise(r => setTimeout(r, 3000));
                    
                    // Update order status in Firestore
                    await db.collection('orders').doc(hash).update({ status: 'Completado' });
                    
                    // Unlock the courses in the user's profile in Firestore
                    const userUid = order.userId;
                    const userDoc = await db.collection('users').doc(userUid).get();
                    if (userDoc.exists) {
                        const profile = userDoc.data();
                        const unlocked = profile.coursesUnlocked || [];
                        
                        if (order.plan === "Premium") {
                            if (!unlocked.includes('electronica')) unlocked.push('electronica');
                            if (!unlocked.includes('mecatronica')) unlocked.push('mecatronica');
                        } else {
                            const careerKey = order.courseId;
                            if (!unlocked.includes(careerKey)) unlocked.push(careerKey);
                        }
                        
                        const updatedProfile = {
                            ...profile,
                            plan: order.plan,
                            career: order.career,
                            coursesUnlocked: unlocked
                        };
                        
                        await db.collection('users').doc(userUid).set(updatedProfile);
                        localStorage.setItem('cae_user', JSON.stringify(updatedProfile));
                    }
                    
                    statusBadge.textContent = "¡Pago Confirmado!";
                    statusBadge.className = "status-badge";
                    statusBadge.style.cssText = "color:#00E676; border-color:rgba(0,230,118,0.3); background:rgba(0,230,118,0.05);";
                    statusMessage.innerHTML = '¡Tu pago ha sido validado exitosamente! Desbloqueando tu acceso académico...';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard?payment=success';
                    }, 2000);
                    
                } catch (err) {
                    console.error("Error processing transaction:", err);
                    statusBadge.textContent = "Error";
                    statusMessage.innerHTML = 'Ocurrió un error al validar tu pago: ' + err.message;
                }
            };
            
            setTimeout(processSimulation, 1000);
        });
    </script>

    <!-- Canvas Particles -->
    <script>
        const canvas = document.getElementById('particles-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            class P {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedY = Math.random() * -0.2 - 0.05;
                    this.alpha = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.y += this.speedY;
                    if (this.y < 0) {
                        this.y = canvas.height;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = 'rgba(124, 77, 255, 0.25)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            for(let i=0; i<30; i++) particles.push(new P());
            
            const anim = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(anim);
            };
            anim();
        }
    </script>
</body>
</html>
